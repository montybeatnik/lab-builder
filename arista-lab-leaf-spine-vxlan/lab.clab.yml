name: arista-lab-leaf-spine-vxlan
topology:
  nodes:
    spine1:
      kind: ceos
      image: ceosimage:4.34.2.1f
      startup-config: configs/spine1.cfg
    spine2:
      kind: ceos
      image: ceosimage:4.34.2.1f
      startup-config: configs/spine2.cfg
    spine3:
      kind: ceos
      image: ceosimage:4.34.2.1f
      startup-config: configs/spine3.cfg
    spine4:
      kind: ceos
      image: ceosimage:4.34.2.1f
      startup-config: configs/spine4.cfg
    leaf1:
      kind: ceos
      image: ceosimage:4.34.2.1f
      startup-config: configs/leaf1.cfg
    leaf2:
      kind: ceos
      image: ceosimage:4.34.2.1f
      startup-config: configs/leaf2.cfg
    edge1:
      kind: linux
      image: alpine:3.19
      exec:
        - ip link set eth1 up
        - ip addr add 172.16.0.3/24 dev eth1
    edge2:
      kind: linux
      image: alpine:3.19
      exec:
        - ip link set eth1 up
        - ip addr add 172.16.0.4/24 dev eth1
  links:
    - endpoints: [spine1:eth1, leaf1:eth1]
    - endpoints: [spine1:eth2, leaf2:eth1]
    - endpoints: [spine2:eth1, leaf1:eth2]
    - endpoints: [spine2:eth2, leaf2:eth2]
    - endpoints: [spine3:eth1, leaf1:eth3]
    - endpoints: [spine3:eth2, leaf2:eth3]
    - endpoints: [spine4:eth1, leaf1:eth4]
    - endpoints: [spine4:eth2, leaf2:eth4]
    - endpoints: [edge1:eth1, leaf1:eth5]
    - endpoints: [edge2:eth1, leaf2:eth5]
