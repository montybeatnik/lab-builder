hostname spine1
username admin privilege 15 role network-admin secret 0 admin
enable secret 0 admin
aaa authorization exec default local
ip routing
management api http-commands
  no shutdown
  protocol https
  vrf MGMT
interface Loopback0
  ip address 10.0.0.1/32
interface Ethernet1
  description to leaf1
  no shutdown
  no switchport
  ip address 10.0.0.8/31
interface Ethernet2
  description to leaf2
  no shutdown
  no switchport
  ip address 10.0.0.10/31
router bgp 65000
  router-id 10.0.0.1
  neighbor 10.0.0.9 remote-as 65100
  neighbor 10.0.0.9 description leaf1
  neighbor 10.0.0.11 remote-as 65101
  neighbor 10.0.0.11 description leaf2
  address-family ipv4
    neighbor 10.0.0.9 activate
    neighbor 10.0.0.11 activate
    network 10.0.0.1/32
  address-family evpn
    neighbor 10.0.0.9 activate
    neighbor 10.0.0.9 send-community extended
    neighbor 10.0.0.11 activate
    neighbor 10.0.0.11 send-community extended
! protocols: bgp, evpn, vxlan
