hostname leaf1
username admin privilege 15 role network-admin secret 0 admin
enable secret 0 admin
aaa authorization exec default local
ip routing
management api http-commands
  no shutdown
  protocol https
  vrf MGMT
interface Loopback0
  ip address 10.0.0.5/32
interface Ethernet1
  description to spine1
  no shutdown
  no switchport
  ip address 10.0.0.9/31
interface Ethernet2
  description to spine2
  no shutdown
  no switchport
  ip address 10.0.0.13/31
interface Ethernet3
  description to spine3
  no shutdown
  no switchport
  ip address 10.0.0.17/31
interface Ethernet4
  description to spine4
  no shutdown
  no switchport
  ip address 10.0.0.21/31
interface Ethernet5
  description to edge1
  no shutdown
  switchport
  switchport access vlan 10
  spanning-tree portfast
router bgp 65100
  router-id 10.0.0.5
  neighbor 10.0.0.8 remote-as 65000
  neighbor 10.0.0.8 description spine1
  neighbor 10.0.0.12 remote-as 65000
  neighbor 10.0.0.12 description spine2
  neighbor 10.0.0.16 remote-as 65000
  neighbor 10.0.0.16 description spine3
  neighbor 10.0.0.20 remote-as 65000
  neighbor 10.0.0.20 description spine4
  address-family ipv4
    neighbor 10.0.0.8 activate
    neighbor 10.0.0.12 activate
    neighbor 10.0.0.16 activate
    neighbor 10.0.0.20 activate
    network 10.0.0.5/32
  address-family evpn
    neighbor 10.0.0.8 activate
    neighbor 10.0.0.8 send-community extended
    neighbor 10.0.0.12 activate
    neighbor 10.0.0.12 send-community extended
    neighbor 10.0.0.16 activate
    neighbor 10.0.0.16 send-community extended
    neighbor 10.0.0.20 activate
    neighbor 10.0.0.20 send-community extended
! protocols: bgp, evpn, vxlan
vlan 10
  name EDGE-VLAN
interface Vlan10
  no shutdown
  no autostate
  ip address 172.16.0.1/24
interface Vxlan1
  vxlan source-interface Loopback0
  vxlan udp-port 4789
  vxlan vlan 10 vni 1010
