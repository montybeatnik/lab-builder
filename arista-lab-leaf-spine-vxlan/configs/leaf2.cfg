hostname leaf2
username admin privilege 15 role network-admin secret 0 admin
enable secret 0 admin
aaa authorization exec default local
ip routing
management api http-commands
  no shutdown
  protocol https
  vrf MGMT
interface Loopback0
  ip address 10.0.0.6/32
interface Ethernet1
  description to spine1
  no shutdown
  no switchport
  ip address 10.0.0.11/31
interface Ethernet2
  description to spine2
  no shutdown
  no switchport
  ip address 10.0.0.15/31
interface Ethernet3
  description to spine3
  no shutdown
  no switchport
  ip address 10.0.0.19/31
interface Ethernet4
  description to spine4
  no shutdown
  no switchport
  ip address 10.0.0.23/31
interface Ethernet5
  description to edge2
  no shutdown
  switchport
  switchport access vlan 10
  spanning-tree portfast
router bgp 65101
  router-id 10.0.0.6
  neighbor 10.0.0.10 remote-as 65000
  neighbor 10.0.0.10 description spine1
  neighbor 10.0.0.14 remote-as 65000
  neighbor 10.0.0.14 description spine2
  neighbor 10.0.0.18 remote-as 65000
  neighbor 10.0.0.18 description spine3
  neighbor 10.0.0.22 remote-as 65000
  neighbor 10.0.0.22 description spine4
  address-family ipv4
    neighbor 10.0.0.10 activate
    neighbor 10.0.0.14 activate
    neighbor 10.0.0.18 activate
    neighbor 10.0.0.22 activate
    network 10.0.0.6/32
  address-family evpn
    neighbor 10.0.0.10 activate
    neighbor 10.0.0.10 send-community extended
    neighbor 10.0.0.14 activate
    neighbor 10.0.0.14 send-community extended
    neighbor 10.0.0.18 activate
    neighbor 10.0.0.18 send-community extended
    neighbor 10.0.0.22 activate
    neighbor 10.0.0.22 send-community extended
! protocols: bgp, evpn, vxlan
vlan 10
  name EDGE-VLAN
interface Vlan10
  no shutdown
  no autostate
  ip address 172.16.0.2/24
interface Vxlan1
  vxlan source-interface Loopback0
  vxlan udp-port 4789
  vxlan vlan 10 vni 1010
