hostname leaf1
username admin privilege 15 role network-admin secret 0 admin
enable secret 0 admin
aaa authorization exec default local
ip routing
management api http-commands
  no shutdown
  protocol https
  vrf MGMT
interface Loopback0
  ip address 10.0.0.3/32
interface Ethernet1
  description to spine1
  no shutdown
  no switchport
  ip address 10.0.0.7/31
interface Ethernet2
  description to spine2
  no shutdown
  no switchport
  ip address 10.0.0.11/31
interface Ethernet3
  description to edge1
  no shutdown
  switchport
  switchport access vlan 10
  spanning-tree portfast
router bgp 65100
  router-id 10.0.0.3
  neighbor 10.0.0.6 remote-as 65000
  neighbor 10.0.0.6 description spine1
  neighbor 10.0.0.10 remote-as 65000
  neighbor 10.0.0.10 description spine2
  address-family ipv4
    neighbor 10.0.0.6 activate
    neighbor 10.0.0.10 activate
    network 10.0.0.3/32
  address-family evpn
    neighbor 10.0.0.6 activate
    neighbor 10.0.0.6 send-community extended
    neighbor 10.0.0.10 activate
    neighbor 10.0.0.10 send-community extended
! protocols: bgp, evpn, vxlan
vlan 10
  name EDGE-VLAN
interface Vlan10
  no shutdown
  no autostate
  ip address 172.16.0.1/24
interface Vxlan1
  vxlan source-interface Loopback0
  vxlan udp-port 4789
  vxlan vlan 10 vni 1010
