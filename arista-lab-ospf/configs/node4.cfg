hostname node4
username admin privilege 15 role network-admin secret 0 admin
enable secret 0 admin
aaa authorization exec default local
ip routing
management api http-commands
  no shutdown
  protocol https
  vrf MGMT
interface Loopback0
  ip address 10.0.0.4/32
interface Ethernet1
  description to node1
  no shutdown
  no switchport
  ip address 10.0.0.13/31
interface Ethernet2
  description to node5
  no shutdown
  no switchport
  ip address 10.0.0.14/31
! protocols: ospf
router ospf 1
  router-id 10.0.0.4
