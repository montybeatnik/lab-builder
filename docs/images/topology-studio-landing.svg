  <circle cx="860" cy="300" r="16" fill="#ffe37a" stroke="#3a3430" stroke-width="1.5"/>
  <circle cx="1020" cy="300" r="16" fill="#ffe37a" stroke="#3a3430" stroke-width="1.5"/>
  <circle cx="1120" cy="300" r="16" fill="#ffe37a" stroke="#3a3430" stroke-width="1.5"/>
  <circle cx="980" cy="380" r="16" fill="#8fe3c6" stroke="#3a3430" stroke-width="1.5"/>
  <circle cx="920" cy="420" r="16" fill="#ff7a4d" stroke="#3a3430" stroke-width="1.5"/>
  <circle cx="1040" cy="420" r="16" fill="#ff7a4d" stroke="#3a3430" stroke-width="1.5"/>

  <rect x="94" y="480" width="1212" height="224" rx="16" fill="url(#panel)" stroke="#e6ded2"/>
